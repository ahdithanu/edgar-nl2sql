# CI for edgar-nl2sql.
#
# Three jobs, in a deliberate trust ladder:
#   1. unit          — always runs; fast, hermetic (no DB, no API keys, everything mocked).
#   2. eval          — runs only when live-service secrets exist; executes the golden-set
#                      eval against real Postgres + Claude + Voyage and GATES on accuracy.
#   3. deploy-staging — push-to-main only, and only after unit AND eval are green.
#
# WHY a preflight job: GitHub Actions does not expose the `secrets` context in
# job-level `if:` expressions, so "skip this job when secrets are absent" cannot be
# written directly. The standard workaround is a tiny job that reads the secrets into
# env (allowed at the step level) and publishes booleans as job outputs. Forks and
# secret-less clones then skip eval/deploy gracefully instead of failing red.

name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Production is promoted by manually running this workflow (Actions tab or
  # `gh workflow run ci.yml`). The dispatch runs unit + eval first, so a
  # promotion cannot skip the gate — see the deploy-production job below.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    name: Check available secrets
    runs-on: ubuntu-latest
    outputs:
      has-eval-secrets: ${{ steps.check.outputs.has-eval-secrets }}
      has-railway-token: ${{ steps.check.outputs.has-railway-token }}
    steps:
      - name: Detect which secrets are configured
        id: check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -n "$DATABASE_URL" ] && [ -n "$ANTHROPIC_API_KEY" ] && [ -n "$VOYAGE_API_KEY" ]; then
            echo "has-eval-secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-eval-secrets=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Eval secrets not configured — eval job will be skipped."
          fi
          if [ -n "$RAILWAY_TOKEN" ]; then
            echo "has-railway-token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-railway-token=false" >> "$GITHUB_OUTPUT"
            echo "::notice::RAILWAY_TOKEN not configured — deploy-staging will be skipped."
          fi

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      # Unit tests are hermetic by contract: anthropic/voyage/psycopg are mocked at
      # module boundaries, so this job needs zero secrets and runs on every PR.
      - name: Run unit tests
        run: pytest -m "not eval" -q

  eval:
    name: Golden-set eval (accuracy gate)
    runs-on: ubuntu-latest
    needs: [preflight, unit]
    if: needs.preflight.outputs.has-eval-secrets == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      # RUN_EVAL=1 un-skips the eval suite; it runs the FULL pipeline (retrieval,
      # generation, retry loop, execution) against live services and asserts
      # accuracy >= EVAL_MIN_ACCURACY. A quality regression fails CI — this is the
      # gate that keeps "the model got worse at SQL" from silently reaching staging.
      - name: Run eval suite
        env:
          RUN_EVAL: "1"
          EVAL_MIN_ACCURACY: "0.85"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: pytest -m eval -q

  deploy-staging:
    name: Deploy to Railway staging
    runs-on: ubuntu-latest
    needs: [preflight, unit, eval]
    # `!cancelled()` + explicit result checks: deploy when unit passed and eval either
    # passed or was skipped for lack of secrets (a skipped eval must not hard-block a
    # secret-less fork, but a FAILED eval always blocks). Production promotion is a
    # deliberate manual step — see README "Staging → production".
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !cancelled() &&
      needs.unit.result == 'success' &&
      (needs.eval.result == 'success' || needs.eval.result == 'skipped') &&
      needs.preflight.outputs.has-railway-token == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service edgar-nl2sql-staging --detach

      # WHY this step exists: `railway up --detach` returns as soon as the
      # upload is accepted, so the job goes green even when the build or the
      # container start subsequently FAILS. That was not hypothetical — a
      # transient Railway failure was reported here as a successful deploy
      # while staging quietly kept serving the previous build. A deploy step
      # that cannot fail is not a gate, so verify the deployment actually
      # became live before calling this job successful.
      - name: Verify staging is live and healthy
        run: |
          URL="https://edgar-nl2sql-staging-production.up.railway.app/health"
          for i in $(seq 1 40); do
            body=$(curl -fsS --max-time 10 "$URL" 2>/dev/null || true)
            if echo "$body" | grep -q '"database":true'; then
              echo "staging healthy: $body"
              exit 0
            fi
            echo "attempt $i — not ready yet (${body:-no response})"
            sleep 15
          done
          echo "::error::Staging did not become healthy within 10 minutes."
          exit 1

  deploy-production:
    name: Deploy to Railway production
    runs-on: ubuntu-latest
    needs: [preflight, unit, eval]
    # Production runs ONLY on a manual dispatch, and ONLY after unit and eval
    # PASSED (not skipped). Staging tolerates a skipped eval so a secret-less
    # fork still deploys; production does not — promoting past the eval gate is
    # the one thing this job exists to make impossible. This is the same gate
    # staging runs behind, applied to prod.
    if: >-
      github.event_name == 'workflow_dispatch' &&
      !cancelled() &&
      needs.unit.result == 'success' &&
      needs.eval.result == 'success' &&
      needs.preflight.outputs.has-railway-token == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service edgar-nl2sql-production --detach

      # Same reason as staging: --detach cannot fail, so verify the container
      # actually came up before this job is allowed to go green.
      - name: Verify production is live and healthy
        run: |
          URL="https://edgar-nl2sql-production-production.up.railway.app/health"
          for i in $(seq 1 40); do
            body=$(curl -fsS --max-time 10 "$URL" 2>/dev/null || true)
            if echo "$body" | grep -q '"database":true'; then
              echo "production healthy: $body"
              exit 0
            fi
            echo "attempt $i — not ready yet (${body:-no response})"
            sleep 15
          done
          echo "::error::Production did not become healthy within 10 minutes."
          exit 1
