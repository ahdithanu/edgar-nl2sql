# Golden set for the end-to-end eval harness (eval/test_eval.py).
#
# Each item pairs a natural-language question with reference SQL. Expected
# values are NEVER hardcoded: the harness executes reference_sql against the
# live database for ground truth, runs the full pipeline (retry loop and all)
# on `question`, and compares the two result sets.
#
# check semantics:
#   relative — numeric cells compared with 1% relative tolerance (rows sorted,
#              numbers coerced). Use for dollar/ratio answers where the
#              pipeline may add rounding or extra descriptive columns.
#   exact    — sorted row sets must match exactly. Use for categorical
#              answers (tickers, names, years).
#
# expect_failure: true — a graceful-failure case: the item PASSES when the
#   pipeline returns success=False with a readable explanation. No
#   reference_sql is executed.

# --- simple lookups ---------------------------------------------------------

- id: revenue_apple_2023
  question: "What was Apple's revenue in fiscal 2023?"
  reference_sql: >
    SELECT fm.value
    FROM financial_metrics fm
    JOIN companies c ON c.id = fm.company_id
    WHERE c.ticker = 'AAPL' AND fm.metric = 'revenue'
      AND fm.fiscal_year = 2023 AND fm.fiscal_period = 'FY'
  check: relative

- id: net_income_microsoft_2022
  question: "How much net income did Microsoft report for fiscal year 2022?"
  reference_sql: >
