# --- superlatives -----------------------------------------------------------

- id: biggest_revenue_2023
  question: "Which company had the highest revenue in fiscal 2023?"
  reference_sql: >
    SELECT c.ticker
    FROM financial_metrics fm
    JOIN companies c ON c.id = fm.company_id
    WHERE fm.metric = 'revenue' AND fm.fiscal_year = 2023
      AND fm.fiscal_period = 'FY'
    ORDER BY fm.value DESC
    LIMIT 1
  check: exact

- id: top3_net_income_2023
  question: "What were the top 3 companies by net income in fiscal 2023?"
  reference_sql: >
    SELECT c.ticker
    FROM financial_metrics fm
    JOIN companies c ON c.id = fm.company_id
    WHERE fm.metric = 'net_income' AND fm.fiscal_year = 2023
      AND fm.fiscal_period = 'FY'
    ORDER BY fm.value DESC
    LIMIT 3
  check: exact

- id: smallest_total_assets_2022
  question: "Which of the covered companies had the smallest total assets in fiscal 2022?"
  reference_sql: >
    SELECT c.ticker
    FROM financial_metrics fm
    JOIN companies c ON c.id = fm.company_id
    WHERE fm.metric = 'total_assets' AND fm.fiscal_year = 2022
      AND fm.fiscal_period = 'FY'
    ORDER BY fm.value ASC
    LIMIT 1
  check: exact

# --- ratios (two metrics, same period) ---------------------------------------

- id: net_margin_apple_2023
  question: "What was Apple's net profit margin in fiscal 2023?"
  reference_sql: >
    SELECT ni.value / rev.value AS net_margin
    FROM financial_metrics ni
    JOIN financial_metrics rev
      ON rev.company_id = ni.company_id
     AND rev.fiscal_year = ni.fiscal_year
     AND rev.fiscal_period = ni.fiscal_period
     AND rev.metric = 'revenue'
    JOIN companies c ON c.id = ni.company_id
    WHERE c.ticker = 'AAPL' AND ni.metric = 'net_income'
      AND ni.fiscal_year = 2023 AND ni.fiscal_period = 'FY'
  check: relative

- id: debt_ratio_exxon_2023
  question: "What was Exxon Mobil's debt ratio (total liabilities over total assets) in fiscal 2023?"
  reference_sql: >
    SELECT tl.value / ta.value AS debt_ratio
    FROM financial_metrics tl
    JOIN financial_metrics ta
      ON ta.company_id = tl.company_id
     AND ta.fiscal_year = tl.fiscal_year
     AND ta.fiscal_period = tl.fiscal_period
     AND ta.metric = 'total_assets'
    JOIN companies c ON c.id = tl.company_id
    WHERE c.ticker = 'XOM' AND tl.metric = 'total_liabilities'
      AND tl.fiscal_year = 2023 AND tl.fiscal_period = 'FY'
  check: relative

# --- YoY growth ---------------------------------------------------------------

- id: revenue_growth_nvidia_2023_2024
  question: "How much did NVIDIA's revenue grow from fiscal 2023 to fiscal 2024, in percent?"
  reference_sql: >
    SELECT (cur.value - prev.value) / prev.value * 100 AS growth_pct
    FROM financial_metrics cur
    JOIN financial_metrics prev
      ON prev.company_id = cur.company_id
     AND prev.metric = cur.metric
     AND prev.fiscal_period = cur.fiscal_period
     AND prev.fiscal_year = 2023
    JOIN companies c ON c.id = cur.company_id
    WHERE c.ticker = 'NVDA' AND cur.metric = 'revenue'
      AND cur.fiscal_year = 2024 AND cur.fiscal_period = 'FY'
  check: relative

# --- multi-company comparison --------------------------------------------------

- id: compare_revenue_apple_microsoft_2023
  question: "Compare Apple's and Microsoft's revenue in fiscal 2023."
  reference_sql: >
    SELECT c.ticker, fm.value
    FROM financial_metrics fm
    JOIN companies c ON c.id = fm.company_id
    WHERE c.ticker IN ('AAPL', 'MSFT') AND fm.metric = 'revenue'
      AND fm.fiscal_year = 2023 AND fm.fiscal_period = 'FY'
    ORDER BY c.ticker
  check: relative

- id: banks_net_income_2023
  question: "What was the net income of JPMorgan, Bank of America, and Goldman Sachs in fiscal 2023?"
  reference_sql: >
    SELECT c.ticker, fm.value
    FROM financial_metrics fm
    JOIN companies c ON c.id = fm.company_id
    WHERE c.ticker IN ('JPM', 'BAC', 'GS') AND fm.metric = 'net_income'
      AND fm.fiscal_year = 2023 AND fm.fiscal_period = 'FY'
    ORDER BY c.ticker
  check: relative

