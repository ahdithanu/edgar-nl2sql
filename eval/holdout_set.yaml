# Held-out eval set (eval/test_eval.py).
#
# These questions were written AFTER the system prompt and the retrieval corpus
# were fixed, and were never consulted while tuning either. The dev set
# (golden_set.yaml) was authored alongside the prompt/corpus, so its accuracy
# reflects fitting as much as capability. This set exists to measure
# generalization: same capability categories, different companies, years, and
# phrasings, plus deliberate probes of the documented failure modes.
#
# Same schema as golden_set.yaml (question / reference_sql / check /
# expect_failure). Ground truth is executed from reference_sql, never hardcoded.

# --- simple lookups (different companies/years than dev) --------------------

- id: h_revenue_google_2022
  question: "What was Alphabet's revenue in fiscal 2022?"
  reference_sql: >
    SELECT fm.value
    FROM financial_metrics fm
    JOIN companies c ON c.id = fm.company_id
    WHERE c.ticker = 'GOOGL' AND fm.metric = 'revenue'
      AND fm.fiscal_year = 2022 AND fm.fiscal_period = 'FY'
  check: relative

# "profit" is not a column; the model must map it to net_income. Probes the
# ambiguous-metric failure mode.
- id: h_profit_amazon_2021
  question: "How much profit did Amazon make in fiscal 2021?"
  reference_sql: >
    SELECT fm.value
    FROM financial_metrics fm
    JOIN companies c ON c.id = fm.company_id
    WHERE c.ticker = 'AMZN' AND fm.metric = 'net_income'
      AND fm.fiscal_year = 2021 AND fm.fiscal_period = 'FY'
  check: relative

# --- quarterly --------------------------------------------------------------

- id: h_revenue_netflix_q1_2024
  question: "What was Netflix's revenue in the first quarter of fiscal 2024?"
  reference_sql: >
