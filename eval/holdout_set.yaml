- id: h_eps_costco_q3_2023
  question: "What was Costco's diluted EPS in Q3 of fiscal 2023?"
  reference_sql: >
    SELECT fm.value
    FROM financial_metrics fm
    JOIN companies c ON c.id = fm.company_id
    WHERE c.ticker = 'COST' AND fm.metric = 'eps_diluted'
